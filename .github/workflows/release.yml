name: Release
# Push a tag like v0.1.0 → builds static musl binaries and attaches them
# to a GitHub Release. Usage:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the exact nightly; `rustup show` installs it.
      - run: rustup show && rustup target add ${{ matrix.target }}
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/$TARGET/release"
          tar czf "pmr-$TAG-$TARGET.tar.gz" pmr
      - uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/pmr-*.tar.gz
          generate_release_notes: true
