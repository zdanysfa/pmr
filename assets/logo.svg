<svg width="760" height="170" viewBox="0 0 760 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="pmr — efficient, fast, production-grade process manager">
  <defs>
    <linearGradient id="flame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#f74c00"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2b2b"/>
      <stop offset="100%" stop-color="#191919"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="14" y="19" width="132" height="132" rx="28" fill="url(#ink)"/>
  <rect x="14" y="19" width="132" height="132" rx="28" stroke="url(#flame)" stroke-width="3"/>
  <!-- terminal chevron + supervised dots -->
  <path d="M44 61 L70 85 L44 109" stroke="url(#flame)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="93"  cy="107" r="7" fill="#3ddc84"/>
  <circle cx="113" cy="107" r="7" fill="#3ddc84"/>
  <circle cx="93"  cy="107" r="7" fill="#3ddc84">
    <animate attributeName="opacity" values="1;0.35;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="113" cy="107" r="7" fill="#3ddc84">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- wordmark -->
  <text x="178" y="102" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="84" font-weight="700" letter-spacing="2" fill="url(#flame)">pmr</text>
  <text x="372" y="102" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="30" font-weight="500" fill="#8a8a8a">— process manager, in Rust</text>

  <!-- tagline -->
  <text x="181" y="138" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="21" fill="#9a9a9a">efficient · fast · production-grade · 14× less memory than pm2 · no Node.js</text>
</svg>
